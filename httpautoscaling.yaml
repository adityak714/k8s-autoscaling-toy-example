kind: ScaledObject
apiVersion: keda.sh/v1alpha1
metadata:
  name: nginx-app-http
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1                  
    kind: Deployment                     # Type of the pod to scale.
    name: nginx-app                      # What pod to scale.
  pollingInterval: 5                    # Optional. Default: 5 seconds
  cooldownPeriod: 120                  # Optional. Default: 300 seconds
  minReplicaCount: 1
  maxReplicaCount: 10
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://prometheus-server.default.svc.cluster.local:80
      query: sum(rate(nginx_http_requests_total[1m]))
      threshold: "10"